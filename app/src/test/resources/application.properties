# Test-only config. The Testcontainers Postgres/MinIO credentials and JDBC URL are injected
# per-class via @DynamicPropertySource; this file holds the static test values.
#
# The d2os_app role password used by V8__app_role.sql. Ephemeral test-container credential (the
# container is torn down after the run) — not a real secret, and it matches the datasource password
# each IT sets in @DynamicPropertySource.
spring.flyway.placeholders.approlepassword=d2os_app

# T067: every existing IT authenticates via the unauthenticated X-Workspace-Id header (predates JWT
# support). Re-enable that fallback for the whole test suite here — a single file, not touching the
# ~25 individual IT classes — while it stays hard-disabled (default false) in every real deployment.
d2os.security.jwt.allow-header-workspace-fallback=true
# Ephemeral test-only signing key so JwtWorkspaceAuthIT (which DOES exercise the JWT path) can issue
# and verify tokens; not a real secret, generated fresh per test run's process, never persisted.
d2os.security.jwt.secret=test-only-signing-key-not-for-production-use-0123456789ABCDEF
