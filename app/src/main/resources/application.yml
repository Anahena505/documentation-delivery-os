spring:
  application:
    name: d2os
  # Runtime datasource connects as the least-privilege d2os_app role (V8 migration) — NOT the
  # table-owning role — so RLS policies actually apply (Postgres exempts table owners from RLS
  # by default; a same-user setup would make every RLS policy in V2-V7 a no-op).
  #
  # NOTE: no default values for passwords — they MUST be supplied via environment variables (see
  # .env.example). Usernames/URLs keep dev defaults since they are not secrets.
  datasource:
    url: ${D2OS_DB_URL:jdbc:postgresql://localhost:5432/d2os}
    username: ${D2OS_DB_APP_USER:d2os_app}
    password: ${D2OS_DB_APP_PASSWORD}
  # Flyway runs as the schema-owning role — separate credentials, separate connection.
  flyway:
    enabled: true
    url: ${D2OS_DB_URL:jdbc:postgresql://localhost:5432/d2os}
    user: ${D2OS_DB_OWNER_USER:d2os_owner}
    password: ${D2OS_DB_OWNER_PASSWORD}
    # Migrations live in each bounded-context module under db/migration; globally version-ordered.
    locations: classpath:db/migration
    baseline-on-migrate: true
    # V8__app_role.sql provisions the d2os_app login role; its password comes from here (env-driven),
    # never hardcoded in the migration SQL.
    placeholders:
      approlepassword: ${D2OS_DB_APP_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  # Let our own default-deny cap (d2os.intake.attachment.max-size-bytes, 20 MiB) govern uploads rather
  # than the servlet container's 1 MiB default, so oversize files reach our handler and get a proper 413.
  servlet:
    multipart:
      max-file-size: ${D2OS_ATTACHMENT_MAX_BYTES:20971520}
      max-request-size: 25MB

# Flowable embedded engine (R1) — async executor on so wait-states survive restart (NFR-4).
# database-schema-update=true lets Flowable auto-manage its OWN internal ACT_*/FLW_* engine
# tables — entirely separate from the Flyway-managed D2OS domain schema above; this is the
# standard/recommended setting, not a shortcut around Flyway.
flowable:
  database-schema-update: true
  async-executor-activate: true
  # Bounded worker pool for concurrent async jobs (research R2, FR-003). The four parallel-block
  # specialists run as independent jobs from this pool; excess jobs queue in Flowable's persisted
  # job table (nothing dropped). Sized to satisfy NFR-1 without exhausting DB connections.
  process:
    async-executor:
      default-async-job-acquire-wait-time: 1s
      max-async-jobs-due-per-acquisition: 16
      core-pool-size: 8
      max-pool-size: 16
      queue-capacity: 256

d2os:
  security:
    jwt:
      # HMAC signing secret for workspace-scoping JWTs (T067, Principle IV). NO default — like the DB
      # and storage passwords above, an unset secret must fail loudly, never silently accept requests.
      # Generate with e.g. `openssl rand -base64 32` (HS256 requires >= 256 bits).
      secret: ${D2OS_JWT_SECRET:}
      issuer: ${D2OS_JWT_ISSUER:d2os}
      expiration-minutes: ${D2OS_JWT_EXPIRATION_MINUTES:60}
      # Unauthenticated X-Workspace-Id header fallback (the v1/T010 stopgap). MUST stay false in any
      # real deployment — true only in app/src/test/resources/application.properties, so existing
      # integration tests (authored before JWT support existed) keep passing unchanged.
      allow-header-workspace-fallback: ${D2OS_ALLOW_HEADER_WORKSPACE_FALLBACK:false}
  ai-gateway:
    # Provider-agnostic; the gateway is the sole call site (AS-5, Principle II).
    provider: ${D2OS_AI_PROVIDER:anthropic}
    model: ${D2OS_AI_MODEL:claude-sonnet-5}
    api-key: ${D2OS_AI_API_KEY:}
    # Caps simultaneous provider calls independently of the engine worker pool (research R2, FR-003)
    # so tuning concurrency does not blow the provider rate limit.
    max-concurrent-calls: ${D2OS_AI_MAX_CONCURRENT:8}
    # Embeddings model for KnowledgeItem indexing/retrieval (Phase 3, research R3). Provider-agnostic
    # (AS-5) and env-driven; model identity/version is recorded per embed call (Principle II).
    # Integration tests never call this — StubAiGatewayClient (T003) returns deterministic vectors.
    # Default text-embedding-3-small supports exact reduction to embed-dimensions via the provider's
    # `dimensions` field, so it fits the VECTOR(384) column out of the box.
    embed-model: ${D2OS_AI_EMBED_MODEL:text-embedding-3-small}
    # Embedding output dimensionality. MUST equal the knowledge_item.embedding VECTOR(n) column (V13)
    # and the chosen embed-model's output dimension. Requested from the provider AND enforced on the
    # response — a mismatch throws EmbeddingDimensionException at the gateway rather than failing
    # cryptically at Postgres insert/query time. Changing this requires a matching DB migration.
    #
    # RE-INDEX CONTRACT (research R3): stored item vectors and query vectors are only comparable when
    # embedded by the SAME model. Every knowledge_item records the embed_model that produced it; the
    # retrieval query filters to rows whose embed_model equals the CURRENTLY configured provider:model,
    # so items embedded under a prior model are excluded (safe, visible: retrieval returns fewer/zero
    # items) rather than mis-ranked against a foreign-space query vector. Changing embed-model or
    # embed-dimensions therefore requires re-embedding existing items (publish new versions through
    # EmbeddingIndexer under the new model) before they are retrievable again. No in-place re-embed job
    # ships in v1 — a model swap is an explicit operational migration, not a config toggle.
    embed-dimensions: ${D2OS_AI_EMBED_DIMENSIONS:384}
  # Knowledge layer (Phase 3). Retrieval is bounded so injected knowledge cannot grow prompts
  # without limit (NFR-7) or add user-visible latency (research R10).
  knowledge:
    # Max KnowledgeItems injected into one persona operation (research R10, FR-002). Prompt growth is
    # bounded by this item-count cap; each injected item's tokens are additionally charged against the
    # per-case budget by TokenBudgetGuard (research R10, NFR-7). v1 deliberately has NO per-item token
    # ceiling — see research R10: a mid-flight content truncation would diverge from the content_hash
    # retrieval already computed, breaking the injection-snapshot/replay contract (FR-006/FR-007).
    max-items-per-operation: ${D2OS_KNOWLEDGE_MAX_ITEMS:5}
    # Retrieval latency budget, p95, measured by KnowledgeRetrievalIT (research R10).
    retrieval-budget-ms: ${D2OS_KNOWLEDGE_RETRIEVAL_BUDGET_MS:500}
  validation:
    rubric-pass-threshold: 0.80   # weighted ≥80% AND no critical fail (FR-005)
    max-generations: 3            # original + 2 revises, then escalate (FR-005)
  orchestration:
    # Dual-state reconciliation sweep interval in ms (FR-010, research R8): engine history vs domain
    # Case state, keyed by Case id. Plain milliseconds so @Scheduled parses it unambiguously.
    reconciliation-interval-ms: ${D2OS_RECONCILIATION_INTERVAL_MS:60000}
  casecore:
    progress:
      # HEARTBEAT cadence (ms) for Running cases so a long AI call never looks frozen (FR-011, ≤5s).
      # Plain milliseconds so @Scheduled parses it unambiguously.
      heartbeat-interval-ms: ${D2OS_PROGRESS_HEARTBEAT_MS:4000}
    mutating-guard:
      # Phase 4 Q2 optimistic single-active-mutating-case guard on the Feature aggregate (research
      # R3, FR-012/013): a guarded UPDATE admits exactly one active mutating Case per Feature.
      # Assessment case creation (mutating=false) skips the guard entirely.
      enabled: ${D2OS_MUTATING_GUARD_ENABLED:true}
  intake:
    attachment:
      # Default-deny upload surface (Principle V, T1-d): only allowlisted types, size-capped.
      max-size-bytes: ${D2OS_ATTACHMENT_MAX_BYTES:20971520}   # 20 MiB
      allowlist: >-
        application/pdf,
        application/vnd.openxmlformats-officedocument.wordprocessingml.document,
        application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,
        application/vnd.openxmlformats-officedocument.presentationml.presentation,
        text/plain, text/markdown, text/csv
      extraction-timeout: ${D2OS_ATTACHMENT_EXTRACTION_TIMEOUT:60s}
    classification:
      # Phase 4 case-type classification DMN hit policy (research R5, FR-002/004): UNIQUE forces a
      # single unambiguous proposed type; no-match rows fall through to UNDETERMINED rather than
      # first-match-wins guessing.
      hit-policy: ${D2OS_INTAKE_CASE_TYPE_HIT_POLICY:UNIQUE}
    conditional-artifacts:
      # Phase 4 conditional-artifacts DMN hit policy (research R6, FR-014/015): COLLECT accumulates
      # every matching row (e.g. multiple independent conditions each adding a required artifact)
      # into the case-type's expected-artifact set instead of picking a single winner.
      hit-policy: ${D2OS_INTAKE_CONDITIONAL_ARTIFACTS_HIT_POLICY:COLLECT}
  storage:
    endpoint: ${D2OS_STORAGE_ENDPOINT:http://localhost:9000}
    bucket: ${D2OS_STORAGE_BUCKET:d2os-artifacts}
    access-key: ${D2OS_STORAGE_ACCESS_KEY:d2os}
    secret-key: ${D2OS_STORAGE_SECRET_KEY}

server:
  port: 8080
  servlet:
    context-path: /
