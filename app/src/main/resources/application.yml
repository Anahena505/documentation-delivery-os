spring:
  application:
    name: d2os
  # Runtime datasource connects as the least-privilege d2os_app role (V8 migration) — NOT the
  # table-owning role — so RLS policies actually apply (Postgres exempts table owners from RLS
  # by default; a same-user setup would make every RLS policy in V2-V7 a no-op).
  datasource:
    url: ${D2OS_DB_URL:jdbc:postgresql://localhost:5432/d2os}
    username: ${D2OS_DB_APP_USER:d2os_app}
    password: ${D2OS_DB_APP_PASSWORD:d2os_app}
  # Flyway runs as the schema-owning role — separate credentials, separate connection.
  flyway:
    enabled: true
    url: ${D2OS_DB_URL:jdbc:postgresql://localhost:5432/d2os}
    user: ${D2OS_DB_OWNER_USER:d2os_owner}
    password: ${D2OS_DB_OWNER_PASSWORD:d2os_owner}
    # Migrations live in each bounded-context module under db/migration; globally version-ordered.
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

# Flowable embedded engine (R1) — async executor on so wait-states survive restart (NFR-4).
# database-schema-update=true lets Flowable auto-manage its OWN internal ACT_*/FLW_* engine
# tables — entirely separate from the Flyway-managed D2OS domain schema above; this is the
# standard/recommended setting, not a shortcut around Flyway.
flowable:
  database-schema-update: true
  async-executor-activate: true

d2os:
  ai-gateway:
    # Provider-agnostic; the gateway is the sole call site (AS-5, Principle II).
    provider: ${D2OS_AI_PROVIDER:anthropic}
    model: ${D2OS_AI_MODEL:claude-sonnet-5}
  validation:
    rubric-pass-threshold: 0.80   # weighted ≥80% AND no critical fail (FR-005)
    max-generations: 3            # original + 2 revises, then escalate (FR-005)
  storage:
    endpoint: ${D2OS_STORAGE_ENDPOINT:http://localhost:9000}
    bucket: ${D2OS_STORAGE_BUCKET:d2os-artifacts}
    access-key: ${D2OS_STORAGE_ACCESS_KEY:d2os}
    secret-key: ${D2OS_STORAGE_SECRET_KEY:d2os_minio_secret}

server:
  port: 8080
  servlet:
    context-path: /
