services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: d2os
      POSTGRES_USER: d2os_owner
      POSTGRES_PASSWORD: d2os_owner
    ports:
      - "5432:5432"
    volumes:
      - d2os-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U d2os_owner -d d2os"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: d2os
      MINIO_ROOT_PASSWORD: d2os_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - d2os-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  d2os-postgres-data:
  d2os-minio-data:
