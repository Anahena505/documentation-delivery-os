services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: d2os
      POSTGRES_USER: ${D2OS_DB_OWNER_USER:-d2os_owner}
      POSTGRES_PASSWORD: ${D2OS_DB_OWNER_PASSWORD:?set D2OS_DB_OWNER_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - d2os-postgres-data:/var/lib/postgresql/data
      # Phase 7 US6 (T044, research R7, NFR-8): WAL segments archived here for point-in-time
      # recovery — a real target RPO ≤ 15 min needs continuous WAL archiving, not just the nightly
      # base backup below (a base backup alone only gets you back to last-night's snapshot).
      - d2os-wal-archive:/wal-archive
    # archive_mode + archive_command: every completed WAL segment is copied to /wal-archive before
    # Postgres considers it safe to recycle. `test ! -f ... && cp` makes the copy idempotent (Postgres
    # may re-invoke archive_command for the same segment after a crash) — required by the archive_command
    # contract (must return 0 only once the segment is durably archived, and never overwrite an existing
    # archived segment). wal_level=replica is the minimum level pg_basebackup / WAL replay requires.
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=test ! -f /wal-archive/%f && cp %p /wal-archive/%f
      - -c
      - archive_timeout=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${D2OS_DB_OWNER_USER:-d2os_owner} -d d2os"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${D2OS_STORAGE_ACCESS_KEY:-d2os}
      MINIO_ROOT_PASSWORD: ${D2OS_STORAGE_SECRET_KEY:?set D2OS_STORAGE_SECRET_KEY in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - d2os-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  d2os-postgres-data:
  d2os-minio-data:
  d2os-wal-archive:
