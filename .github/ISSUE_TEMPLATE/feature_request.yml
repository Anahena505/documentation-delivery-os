name: 💡 Feature request
description: Propose a capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! Proposals that reference a spec in `specs/` are easiest to act on.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and why is it hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? How might it fit the modular-monolith boundaries and the five constitutional principles?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: constitution
    attributes:
      label: Fit check
      options:
        - label: This is additive within existing module boundaries (doesn't move classes between modules)
        - label: It preserves Definition immutability and auditability where relevant
