apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "d2os.fullname" . }}
  labels:
    {{- include "d2os.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "d2os.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "d2os.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when non-secret config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Non-secret config from the ConfigMap and credentials from the Secret are both surfaced
          # as environment variables. The Secret is expected to carry the credential keys declared
          # in values.yaml (populated by external-secrets).
          envFrom:
            - configMapRef:
                name: {{ include "d2os.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secretRefs.name }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
