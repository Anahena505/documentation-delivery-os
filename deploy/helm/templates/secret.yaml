{{/*
Credential Secret for D2OS.

Production default (`secrets.create: false`): this template renders NOTHING — the Secret named by
`secretRefs.name` is provisioned out-of-band by the platform's external-secrets mechanism, and the
Deployment mounts it via envFrom. The chart never commits credential values.

Dev/throwaway only (`secrets.create: true`): the chart renders a Secret named `secretRefs.name`
containing exactly the declared credential keys. Values come from `secrets.stringData` (empty by
default, so keys render as empty strings unless the installer supplies them via --set). No literal
credentials are committed in this repository.
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretRefs.name }}
  labels:
    {{- include "d2os.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range .Values.secrets.keys }}
  {{ . }}: {{ index $.Values.secrets.stringData . | default "" | quote }}
  {{- end }}
{{- end }}
